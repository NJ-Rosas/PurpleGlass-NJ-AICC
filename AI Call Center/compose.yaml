name: purpleglass-prototype

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-purpleglass}
      POSTGRES_USER: ${POSTGRES_USER:-purpleglass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-purpleglass_dev_only}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - prototype

  mqtt:
    image: eclipse-mosquitto:2.1.2-alpine
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./deploy/local/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-p", "1883", "-t", "pg/local/health", "-m", "ping", "-q", "0"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - prototype

  valkey:
    image: valkey/valkey:8.1.8-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - prototype

networks:
  prototype:
    driver: bridge

volumes:
  postgres-data:
  mosquitto-data:
  valkey-data:
